name: CI - Vue 3 Vite with Docker

on:
  pull_request:
    branches: [ "main", "develop" ]
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Debug avant tout pour voir ce qui est là
      - name: Debug workspace
        run: |
          echo "=== Racine ===" && ls -la
          echo "=== Dockerfile ===" && cat Dockerfile

      - name: Build Docker image
        run: docker build -t my-vue-app:${{ github.sha }} .